<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempahan Berjaya — BarberGo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/design-system.css">
<style>
body { background: var(--bg); display: flex; flex-direction: column; min-height: 100vh; }
.conf-page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1rem; }
.conf-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 3rem 2.5rem;
  max-width: 520px;
  width: 100%;
  box-shadow: var(--shadow-lg);
  text-align: center;
}
.conf-icon {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: var(--primary);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1.8rem;
}
.conf-icon svg { width: 32px; height: 32px; }
.conf-card h1 { font-size: 2rem; margin-bottom: 0.6rem; }
.conf-card > p { margin-bottom: 2rem; }
.conf-details {
  background: var(--surface-alt);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 1.4rem;
  text-align: left;
  margin-bottom: 2rem;
}
.conf-row {
  display: flex; justify-content: space-between;
  font-size: 0.88rem;
  padding: 0.4rem 0;
}
.conf-row:not(:last-child) { border-bottom: 1px solid var(--divider); }
.conf-row .label { color: var(--text-muted); }
.conf-row .val { font-weight: 600; }
.conf-actions { display: grid; gap: 0.8rem; }
.status-badge {
  display: inline-block;
  padding: 0.3rem 0.8rem;
  border-radius: var(--r-full);
  font-size: 0.75rem;
  font-family: var(--font-mono);
  font-weight: 600;
  letter-spacing: 0.05em;
  background: rgba(11,11,13,0.08);
  color: var(--text-secondary);
}
</style>
</head>
<body>
<div class="conf-page">
  <div class="conf-card" id="confCard">
    <div class="conf-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <h1>Tempahan Diterima!</h1>
    <p class="muted">Barber kami akan menghubungi anda tidak lama lagi untuk mengesahkan.</p>
    <div class="conf-details" id="confDetails">
      <p class="muted">Memuatkan...</p>
    </div>
    <div class="conf-actions">
      <a href="/booking.html" class="btn btn-primary">Tempah Lagi</a>
      <a href="/" class="btn btn-ghost">Kembali ke Laman Utama</a>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
(async function () {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) return;
  try {
    const b = await API.booking.track(id);
    const statusMap = {
      pending: 'Menunggu Pengesahan',
      confirmed: 'Disahkan',
      on_the_way: 'Barber Dalam Perjalanan',
      arrived: 'Barber Telah Tiba',
      in_progress: 'Sedang Diproses',
      completed: 'Selesai',
      cancelled: 'Dibatalkan'
    };
    document.getElementById('confDetails').innerHTML = `
      <div class="conf-row"><span class="label">No. Tempahan</span><span class="val">#${b.id}</span></div>
      <div class="conf-row"><span class="label">Gaya</span><span class="val">${b.service_name}</span></div>
      <div class="conf-row"><span class="label">Tarikh</span><span class="val">${b.booking_date} ${b.booking_time}</span></div>
      <div class="conf-row"><span class="label">Alamat</span><span class="val">${b.address}</span></div>
      ${b.barber_name ? `<div class="conf-row"><span class="label">Barber</span><span class="val">${b.barber_name}</span></div>` : ''}
      <div class="conf-row"><span class="label">Jumlah Bayaran</span><span class="val">RM${Number(b.final_price).toFixed(0)}</span></div>
      <div class="conf-row"><span class="label">Bayaran</span><span class="val">${b.payment_method === 'cash' ? 'Tunai kepada Barber' : b.payment_method}</span></div>
      <div class="conf-row"><span class="label">Status</span><span class="val"><span class="status-badge">${statusMap[b.status] || b.status}</span></span></div>
    `;
  } catch (e) {
    document.getElementById('confDetails').innerHTML = '<p class="muted">Tidak dapat memuatkan maklumat tempahan.</p>';
  }
})();
</script>
</body>
</html>
